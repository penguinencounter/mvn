<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0.1.6-pre.2</title>
    <style>
        /* stupid simple styles so it doesn't look straight out of CERN */

        :root {
            --bg: #181818;
            --surface: #282828;
            --text: #e8e8e8;
            --highlight: #80e880;
            --highlight-bar: #206020;
            --link: #8080ff;
            --link-visited: #b080ff;
            --aside: #b0b0b0;
            --outdated: #602828;
            --outdated2: #ff8080;
            --unofficial: #602860;
            --unofficial2: #ff80ff;
        }

        @media screen and (prefers-color-scheme: light) {
            :root {
                --bg: #e8e8e8;
                --surface: #d8d8d8;
                --text: #181818;
                --highlight: #206020;
                --highlight-bar: #80e880;
                --link: #4040b0;
                --link-visited: #8040b0;
                --aside: #404040;
            }
        }

        @keyframes fade-out {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            font-size: 1.1rem;
        }

        main {
            max-width: 60rem;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr min(40rem, 100%) 1fr;
            grid-auto-flow: row;
        }

        a {
            color: var(--link);
        }

        a:visited {
            color: var(--link-visited);
        }

        h1,
        h2,
        h3 {
            position: relative;
            font-family: serif;
        }

        h1:target,
        h2:target,
        h3:target {
            color: var(--highlight);
            position: relative;
        }

        h1:target::after,
        h2:target::after,
        h3:target::after {
            content: "";
            position: absolute;
            width: 4px;
            inset: 0 auto 0 min(-8px, -0.5rem);
            background-color: var(--highlight);
            animation: fade-out 2s 2s ease-in forwards;
        }

        .versions {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(12rem, 1fr));
            gap: 0.5rem;
        }

        .version {
            padding: 0.5rem;
            border-radius: 0.2rem;
            background-color: var(--surface);
            font-size: 1.5rem;
            text-decoration: none;
        }

        main>* {
            grid-column: 2/3;
            margin-left: 1rem;
            margin-right: 1rem;
        }

        main>.breakout {
            grid-column: 1/-1;
        }

        .label {
            display: inline-block;
            height: max-content;
            width: max-content;
            font-weight: bold;
            font-size: 1rem;
            font-family: sans-serif;
            padding: 0.2rem;
            border-radius: 0.2rem;

            --border: #f0f;
            --back: #808;
            background-color: var(--back);
            border: 1px solid var(--border);
            color: #e8e8e8;
        }

        .label#_unofficial {
            --border: var(--unofficial2);
            --back: var(--unofficial);
        }

        .label#_outdated {
            --border: var(--outdated2);
            --back: var(--outdated);
        }

        .footer {
            color: var(--aside);
        }

        [hidden] {
            display: none !important;
        }
    </style>
    <script>
        function checkDomain() {
            console.info("Yeah!")
            if (!location.hostname.endsWith("figuramc.org")) document.getElementById("_unofficial").removeAttribute("hidden");
        }
        window.addEventListener("DOMContentLoaded", checkDomain)
    </script>
</head>

<body>
    <main>
        <h1 id="title">
            0.1.6-pre.2
            <div class="label" id="_unofficial" hidden title="This is not an official Figura release.">UNOFFICIAL</div>
            <div class="label" id="_outdated">OUTDATED</div>
        </h1>
        <p class="defunct">
            Downloads are no longer available on this page. Please consult the
            <a href="https://docs.figuramc.org/versions/0.1.6-pre.2">official download page</a> for this version.
        </p>
    </main>
</body>

</html>
